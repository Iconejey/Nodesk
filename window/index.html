<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Nono-Terminal</title>
		<link rel="stylesheet" href="style.css" />
		<script src="window.js" defer></script>
	</head>
	<body>
		<terminal-chat class="mode-full" id="terminal-chat-container">
			<!-- Dynamically appended chat history will go here -->
			
			<chat-block from="user" id="active-chat-block">
				<pre class="input" contenteditable="true" id="active-input" spellcheck="false"></pre>
				<div class="slash-suggestions" id="slash-suggestions"></div>
			</chat-block>
		</terminal-chat>
	</body>
</html>
